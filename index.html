<!doctype html><html lang="pt-br"><meta charset="utf-8">
<title>Equipe Tenebrosa</title>
<style>
body{margin:0;background:radial-gradient(circle,#24103d,#05030a);color:#fff;font-family:Arial;text-align:center;overflow:hidden}
.wrap{padding:24px}h1{color:#b56cff;text-shadow:0 0 15px #b56cff}
#clock{font-size:42px;font-weight:bold}#dj{font-size:36px;color:#7fff00;font-weight:bold}
#next,#time{font-size:22px}.eq{display:flex;justify-content:center;gap:5px;margin:15px}
.eq div{width:8px;background:#b56cff;animation:eq 1s infinite alternate}
.eq div:nth-child(2){animation-delay:.2s}.eq div:nth-child(3){animation-delay:.4s}.eq div:nth-child(4){animation-delay:.6s}.eq div:nth-child(5){animation-delay:.8s}
@keyframes eq{from{height:12px}to{height:50px}}
</style><body><div class=wrap>
<h1>🎧 EQUIPE TENEBROSA 🎧</h1><div><i>"Simbora ser feliz"</i></div>
<div id=clock></div><div class=eq><div></div><div></div><div></div><div></div><div></div></div>
<h2>AGORA TOCANDO</h2><div id=dj></div><div id=time></div><h3>PRÓXIMO DJ</h3><div id=next></div>
<script>
const agenda=[
['19:00','20:15','DJ Milla Pagode'],
['20:15','21:30','DJ Arley Sá Dreams'],
['21:30','22:45','DJ Pérola Helsing'],
['22:45','24:00','DJ Edson Pagode']
];
const toMin=t=>{let[h,m]=t.split(':').map(Number);return h*60+m}
function tick(){
 const d=new Date();
 clock.textContent=d.toLocaleTimeString('pt-BR');
 const now=d.getHours()*60+d.getMinutes();
 let found=false;
 for(let i=0;i<agenda.length;i++){
  let[s,e,n]=agenda[i];
  if(now>=toMin(s)&&now<toMin(e)){found=true;dj.textContent=n;time.textContent=s+' às '+(e=='24:00'?'00:00':e);
   next.textContent=i<agenda.length-1?agenda[i+1][2]+' - '+agenda[i+1][0]+' às '+agenda[i+1][1]:'Obrigado por participar!';break;}
 }
 if(!found){dj.textContent='Fora da programação';time.textContent='';next.textContent='Equipe Tenebrosa';}
}
tick();setInterval(tick,1000);
</script></body></html>
